<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cổng Game Văn Phòng</title>
    <style>
        body { font-family: Arial, sans-serif; background: #e9ecef; text-align: center; padding: 20px; }
        .game-card { display: inline-block; background: white; padding: 20px; margin: 10px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); width: 200px; }
        .game-card h3 { margin-top: 0; }
        button { background: #007bff; color: white; border: none; padding: 10px 15px; border-radius: 5px; cursor: pointer; width: 100%; }
        button:hover { background: #0056b3; }
        #chat-box { background: white; width: 80%; max-width: 500px; height: 150px; margin: 20px auto; overflow-y: scroll; padding: 10px; border: 1px solid #ccc; text-align: left; }
    </style>
    <script src="/socket.io/socket.io.js"></script>
</head>
<body>
    <h1>🎮 Cổng Game Giải Lao 🎮</h1>
    
    <div class="game-card">
        <h3>🃏 Bài UNO</h3>
        <p>Sát phạt, lươn lẹo (2-10 người)</p>
        <button onclick="window.location.href='/uno'">Vào Phòng</button>
    </div>

    <div class="game-card">
        <h3>♟️ Cờ Vua</h3>
        <p>Đấu trí 1v1</p>
        <button onclick="window.location.href='/chess'">Vào Phòng</button>
    </div>

    <hr style="margin: 30px 0; border: 1px solid #ddd;">

    <h2>Kênh Chat Tổng</h2>
    <input type="text" id="username" placeholder="Tên của bạn..." style="padding: 5px;">
    <div id="chat-box"></div>
    <input type="text" id="msg" placeholder="Nhập tin nhắn..." style="padding: 5px; width: 250px;">
    <button onclick="sendChat()" style="width: auto;">Gửi</button>

    <script>
        const socket = io();

        function sendChat() {
            const name = document.getElementById('username').value || "Ẩn danh";
            const msg = document.getElementById('msg').value;
            if(!msg) return;
            socket.emit('lobby-chat', { name, msg });
            document.getElementById('msg').value = '';
        }

        socket.on('lobby-chat', (data) => {
            const box = document.getElementById('chat-box');
            box.innerHTML += `<p><b>${data.name}:</b> ${data.msg}</p>`;
            box.scrollTop = box.scrollHeight;
        });
    </script>
</body>
</html>
